services:
  - type: web
    name: form-sender
    env: python
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium && python -m playwright install-deps chromium
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        sync: false
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: GAS_URL
        sync: false
