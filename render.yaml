services:
  - type: web
    name: form-sender
    env: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: python -c "import os; os.environ['FLASK_ENV']='production'; exec(open('app.py').read())"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: GAS_URL
        sync: false
